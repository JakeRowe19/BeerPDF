<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Этикетки — Темное Светлое</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="title">Этикетки</div>
      <div class="subtitle">Темное Светлое</div>
    </div>
    <div class="controls">
      <button id="refresh" class="btn">Обновить</button>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Загрузка…</div>
    <div id="grid" class="grid" aria-live="polite"></div>
  </main>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="modal__backdrop" id="modalBackdrop"></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-label="Печать">
      <div class="modal__header">
        <div class="modal__title" id="modalTitle">Печать</div>
        <div class="modal__actions">
          <a id="openPdf" class="btn btn--ghost" target="_blank" rel="noopener">Открыть PDF</a>
          <button id="printBtn" class="btn">Печать</button>
          <button id="closeBtn" class="btn btn--ghost">Закрыть</button>
        </div>
      </div>
      <div class="modal__body">
        <iframe id="pdfFrame" class="frame" title="PDF предпросмотр"></iframe>
      </div>
      <div class="modal__hint">
        Совет: в настройках печати отключи «Подогнать / Fit», чтобы сохранить 58×60 мм.
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
