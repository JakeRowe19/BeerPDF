name: Generate PDF labels

on:
  schedule:
    - cron: "0 * * * *"   # every hour
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-labels
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate PDFs
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
          STORE_NAME: ${{ secrets.STORE_NAME }}
        run: |
          python scripts/generate_labels.py

      - name: Copy labels to GitHub Pages folder
        run: |
          rm -rf docs/labels
          mkdir -p docs/labels
          cp -R labels/* docs/labels/

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add labels/ docs/labels/
            git commit -m "Update labels"
            git push
          else
            echo "No changes to commit."
          fi
